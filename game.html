<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Rufo 3D FPS Style | Rufo YT CLASS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        .bar-bg { width: 200px; height: 10px; background: rgba(255,255,255,0.2); border: 1px solid #fff; margin-top: 5px; }
        #player-health { width: 100%; height: 100%; background: #00ff00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); }
        #instructions { position: absolute; top: 50%; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="color: #ff0000; margin: 0;">RUFO YT CLASS</h2>
        <div class="bar-bg"><div id="player-health"></div></div>
    </div>

    <div id="crosshair"></div>
    <div id="instructions">
        <h1>OYUNA BAŞLAMAQ ÜÇÜN KLİKLƏ</h1>
        <p>(W,A,S,D - Hərəkət | MAUS - Baxış və Atəş | ESC - Çıxış)</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // İşıq
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xff0000, 0.8);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // Arena
        scene.add(new THREE.GridHelper(100, 50, 0xff0000, 0x222222));

        // Xarakter (FPS üçün görünməz, amma yerini bilmək üçün qrup)
        const player = new THREE.Group();
        scene.add(player);
        player.position.y = 1.6; // Göz hündürlüyü

        // Düşmən
        const enemyGeo = new THREE.BoxGeometry(1, 2, 1);
        const enemyMat = new THREE.MeshStandardMaterial({color: 0xff0000});
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        enemy.position.set(0, 1, -10);
        scene.add(enemy);

        // Güllə Sistemi
        const bullets = [];
        function shoot() {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position);
            
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            b.userData.velocity = direction.multiplyScalar(1.2);
            
            scene.add(b);
            bullets.push(b);
        }

        // MAUS KİLİDLƏMƏ SİSTEMİ (Pointer Lock)
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            instructions.style.display = document.pointerLockElement === document.body ? 'none' : 'block';
        });

        // Kamera İdarəsi (Mausla)
        let pitch = 0, yaw = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch)); // Yuxarı/aşağı limiti
            }
        });

        window.addEventListener('mousedown', () => {
            if (document.pointerLockElement === document.body) shoot();
        });

        // Hərəkət
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let enemyHP = 100;

        function update() {
            // Baxış bucağını tətbiq et
            player.rotation.y = yaw;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            camera.position.copy(player.position);

            // Hərəkət mexanikası (Baxdığın tərəfə uyğun)
            const speed = 0.15;
            const dirZ = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            const dirX = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);

            if (keys['KeyW']) player.position.add(dirZ.multiplyScalar(speed));
            if (keys['KeyS']) player.position.add(dirZ.multiplyScalar(-speed));
            if (keys['KeyA']) player.position.add(dirX.multiplyScalar(-speed));
            if (keys['KeyD']) player.position.add(dirX.multiplyScalar(speed));

            // Güllə hərəkəti və vuruş
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.position.add(b.userData.velocity);
                
                if (b.position.distanceTo(enemy.position) < 1.5) {
                    enemyHP -= 10;
                    scene.remove(b);
                    bullets.splice(i, 1);
                    enemy.material.emissive.setHex(0xffffff);
                    setTimeout(() => enemy.material.emissive.setHex(0x000000), 50);
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
