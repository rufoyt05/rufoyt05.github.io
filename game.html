<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Rufo 3D Shooter Pro | Rufo YT CLASS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        .bar-bg { width: 200px; height: 15px; background: rgba(255,255,255,0.2); border: 2px solid #fff; margin-top: 5px; border-radius: 5px; }
        #player-health { width: 100%; height: 100%; background: #00ff00; }
        #enemy-health-container { position: absolute; top: 20px; right: 20px; text-align: right; }
        #enemy-bar { width: 100%; height: 100%; background: #ff0000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid red; border-radius: 50%; transform: translate(-50%, -50%); }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: yellow; font-size: 50px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <h2 style="color: #ff0000; margin: 0;">RUFO YT CLASS</h2>
        <div class="bar-bg"><div id="player-health"></div></div>
    </div>

    <div id="enemy-health-container">
        <div style="color: white;">BOSS</div>
        <div class="bar-bg"><div id="enemy-bar"></div></div>
    </div>

    <div id="msg"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SƏHNƏ VƏ KAMERA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. İŞIQ
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff0000, 1, 100);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 3. ARENA (3D DÖŞƏMƏ)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide })
        );
        floor.rotation.x = Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(100, 40, 0xff0000, 0x333333));

        // 4. XARAKTER YARATMA (Gözləri olan daha realistik 3D)
        function createMan(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.6;
            group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.4;
            group.add(head);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x000}));
            gun.position.set(0.5, 0.8, -0.4);
            group.add(gun);
            return group;
        }

        const player = createMan(0x0000ff);
        scene.add(player);

        const enemy = createMan(0xff0000);
        enemy.position.set(0, 0, -15);
        scene.add(enemy);

        // 5. GÜLLƏ SİSTEMİ
        const bullets = [];
        window.addEventListener('mousedown', () => {
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshBasicMaterial({color: 0xffff00})
            );
            b.position.set(player.position.x + 0.5, 0.8, player.position.z - 1);
            
            // Güllənin hədəfə getməsi üçün vektor
            const targetDir = new THREE.Vector3(0, 0, -1);
            b.userData.velocity = targetDir.multiplyScalar(0.8);
            
            scene.add(b);
            bullets.push(b);
        });

        // 6. OYUN MEXANİKASI
        let playerHP = 100, enemyHP = 100;
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (playerHP <= 0 || enemyHP <= 0) {
                const m = document.getElementById('msg');
                m.style.display = "block";
                m.innerText = enemyHP <= 0 ? "BOSS MƏĞLUB OLDU!" : "SƏN ÖLDÜN!";
                return;
            }

            // Hərəkət
            if (keys['KeyW']) player.position.z -= 0.15;
            if (keys['KeyS']) player.position.z += 0.15;
            if (keys['KeyA']) player.position.x -= 0.15;
            if (keys['KeyD']) player.position.x += 0.15;

            // Güllə Hərəkəti və Dəqiq Toqquşma
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.position.add(b.userData.velocity);

                // Düşmənə dəyməni yoxla (Bounding Box metodu ilə)
                let bBox = new THREE.Box3().setFromObject(b);
                let eBox = new THREE.Box3().setFromObject(enemy);

                if (bBox.intersectsBox(eBox)) {
                    enemyHP -= 10; // Can gedir!
                    document.getElementById('enemy-bar').style.width = enemyHP + "%";
                    scene.remove(b);
                    bullets.splice(i, 1);
                    
                    // Effekt: Düşmən titrəsin
                    enemy.position.x += (Math.random() - 0.5) * 0.5;
                }
                
                if (b.position.z < -50) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            // Düşmən AI (Təqib)
            const dist = player.position.distanceTo(enemy.position);
            if (dist > 2) {
                const dir = player.position.clone().sub(enemy.position).normalize();
                enemy.position.x += dir.x * 0.06;
                enemy.position.z += dir.z * 0.06;
                enemy.lookAt(player.position);
            } else {
                playerHP -= 0.5;
                document.getElementById('player-health').style.width = playerHP + "%";
            }

            // Kamera (TPS)
            camera.position.set(player.position.x, player.position.y + 4, player.position.z + 8);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
