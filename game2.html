<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Rufo Parkour | Audi City Levels</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; bottom: 30px; right: 30px; color: white; text-align: right; z-index: 100; }
        #speed { font-size: 70px; font-weight: 900; }
        #level-ui { position: absolute; top: 30px; left: 30px; color: #00ff00; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #00ff00; }
        #loading { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .bar { width: 200px; height: 5px; background: #333; margin-top: 10px; }
        #prog { width: 0%; height: 100%; background: #00ff00; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loading">
        <div id="status">Sistem Yüklənir...</div>
        <div class="bar"><div id="prog"></div></div>
    </div>

    <div id="level-ui">LEVEL: <span id="lvl-num">1</span></div>

    <div id="ui">
        <div id="speed">0</div>
        <div style="color:#00ff00">KM/H</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fflate/0.7.4/fflate.min.js"></script>

    <script>
        let currentLevel = 1;
        let speed = 0, angle = 0, targetAngle = 0;
        let playerCar, world, finishLine;
        const keys = {};

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 30000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // İşıqlandırma
        scene.add(new THREE.AmbientLight(0xffffff, 2.0)); 
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(500, 1000, 500);
        scene.add(sun);

        const manager = new THREE.LoadingManager();
        manager.onProgress = (url, loaded, total) => {
            document.getElementById('prog').style.width = (loaded / total * 100) + '%';
        };
        manager.onLoad = () => {
            document.getElementById('loading').style.display = 'none';
            initLevel();
            animate();
        };

        const gltfLoader = new THREE.GLTFLoader(manager);
        const fbxLoader = new THREE.FBXLoader(manager);

        // 1. DÜNYANI YÜKLƏ (FBX)
        fbxLoader.load('Street environment_V01.FBX', function (object) {
            world = object;
            world.scale.set(0.005, 0.005, 0.005); 
            world.position.set(0, 0, 0);
            world.traverse(child => {
                if (child.isMesh) {
                    if (!child.material.map) child.material = new THREE.MeshStandardMaterial({color: 0x666666});
                }
            });
            scene.add(world);
        });

        // 2. AUDI YÜKLƏ (GLB)
        gltfLoader.load('audi.glb', function(gltf) {
            playerCar = gltf.scene;
            playerCar.scale.set(1.5, 1.5, 1.5);
            playerCar.rotation.y = Math.PI; 
            scene.add(playerCar);
        });

        // Finiş Darvazası Yaradan Funksiya
        function initLevel() {
            if (finishLine) scene.remove(finishLine);
            
            // Hər leveldə finiş daha uzağa qoyulur
            const finishDist = -500 * currentLevel; 
            
            const geo = new THREE.BoxGeometry(40, 15, 2);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x00ff00, 
                emissive: 0x00ff00, 
                transparent: true, 
                opacity: 0.4
            });
            finishLine = new THREE.Mesh(geo, mat);
            finishLine.position.set(0, 7, finishDist);
            scene.add(finishLine);
            
            document.getElementById('lvl-num').innerText = currentLevel;
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (!playerCar) return;

            // Hərəkət məntiqi
            const maxS = currentLevel > 1 ? 2.5 : 1.8; // Level artdıqca sürət limiti artır
            if (keys['KeyW']) speed = Math.min(speed + 0.02, (keys['ShiftLeft'] ? maxS + 1.5 : maxS));
            else if (keys['KeyS']) speed = Math.max(speed - 0.04, -1);
            else speed *= 0.98;

            if (Math.abs(speed) > 0.1) {
                if (keys['KeyA']) targetAngle -= 0.04;
                if (keys['KeyD']) targetAngle += 0.04;
            }
            angle += (targetAngle - angle) * 0.1;

            playerCar.position.x += Math.sin(angle) * speed;
            playerCar.position.z += Math.cos(angle) * speed;
            playerCar.rotation.y = angle + Math.PI;

            // Level Keçid Yoxlanışı
            if (playerCar.position.z < finishLine.position.z) {
                currentLevel++;
                playerCar.position.set(0, 0, 0); // Starta qaytar
                speed = 0;
                initLevel(); // Yeni leveli başlat
                alert("Təbriklər! Level " + currentLevel + " başladı!");
            }

            // Kamera takibi
            const camOffset = new THREE.Vector3(0, 5, 15).applyQuaternion(playerCar.quaternion);
            camera.position.lerp(playerCar.position.clone().add(camOffset), 0.1);
            camera.lookAt(playerCar.position);

            document.getElementById('speed').innerText = Math.floor(Math.abs(speed) * 100);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 15 saniyə təhlükəsizlik taymeri
        setTimeout(() => {
            if(document.getElementById('loading').style.display !== 'none') {
                document.getElementById('loading').style.display = 'none';
                animate();
            }
        }, 15000);
    </script>
</body>
</html>
