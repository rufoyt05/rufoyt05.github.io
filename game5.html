<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Rufo City | Audi & Realistic World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 30px; right: 30px; color: white; text-align: right; z-index: 100; }
        #speed { font-size: 70px; font-weight: 900; }
        #loading { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .loader-bar { width: 200px; height: 4px; background: #333; margin-top: 10px; }
        #progress { width: 0%; height: 100%; background: #ff0000; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="load-text">Resurslar Yüklənir...</div>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="ui">
        <div id="speed">0</div>
        <div style="color:red">KM/H</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fflate/0.7.4/fflate.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(100, 500, 100);
        scene.add(sun);

        // YÜKLƏMƏ MENECERİ (Xətaları idarə etmək üçün)
        const manager = new THREE.LoadingManager();
        manager.onProgress = (url, itemsLoaded, itemsTotal) => {
            document.getElementById('progress').style.width = (itemsLoaded / itemsTotal * 100) + '%';
        };
        manager.onLoad = () => {
            console.log("Bütün fayllar yükləndi!");
            document.getElementById('loading').style.display = 'none';
            animate();
        };
        manager.onError = (url) => {
            console.log('Yüklənmə xətası (keçilir): ' + url);
            // Bir fayl tapılmasa belə oyunu başlatmaq üçün onLoad-u məcburi çağırırıq
        };

        const gltfLoader = new THREE.GLTFLoader(manager);
        const fbxLoader = new THREE.FBXLoader(manager);
        let playerCar, world;

        // 1. DÜNYANI YÜKLƏ (FBX)
        fbxLoader.load('Street environment_V01.FBX', function (object) {
            world = object;
            world.scale.set(0.02, 0.02, 0.02); // Ölçünü bir az kiçiltdik (FBX çox böyük olur)
            scene.add(world);
        });

        // 2. AUDI YÜKLƏ (GLB)
        gltfLoader.load('audi.glb', function(gltf) {
            playerCar = gltf.scene;
            playerCar.scale.set(1.5, 1.5, 1.5);
            playerCar.rotation.y = Math.PI; 
            scene.add(playerCar);
        });

        let speed = 0, angle = 0, targetAngle = 0;
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (!playerCar) return;

            if (keys['KeyW']) speed = Math.min(speed + 0.02, (keys['ShiftLeft'] ? 3.5 : 1.8));
            else if (keys['KeyS']) speed = Math.max(speed - 0.04, -1);
            else speed *= 0.98;

            if (Math.abs(speed) > 0.1) {
                if (keys['KeyA']) targetAngle -= 0.04;
                if (keys['KeyD']) targetAngle += 0.04;
            }
            angle += (targetAngle - angle) * 0.1;

            playerCar.position.x += Math.sin(angle) * speed;
            playerCar.position.z += Math.cos(angle) * speed;
            playerCar.rotation.y = angle + Math.PI;

            const camOffset = new THREE.Vector3(0, 6, 18).applyQuaternion(playerCar.quaternion);
            camera.position.lerp(playerCar.position.clone().add(camOffset), 0.1);
            camera.lookAt(playerCar.position);

            document.getElementById('speed').innerText = Math.floor(Math.abs(speed) * 100);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Təhlükəsizlik: 10 saniyə sonra hələ də açılmayıbsa, məcburi başlat
        setTimeout(() => {
            if(document.getElementById('loading').style.display !== 'none') {
                console.warn("Yükləmə uzun çəkdi, məcburi başladılır...");
                document.getElementById('loading').style.display = 'none';
                animate();
            }
        }, 10000);
    </script>
</body>
</html>
