<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Rufo City | Audi Drive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; bottom: 30px; right: 30px; color: white; text-align: right; z-index: 100; }
        #speed { font-size: 70px; font-weight: 900; }
        #loading { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .bar { width: 200px; height: 5px; background: #333; margin-top: 10px; }
        #prog { width: 0%; height: 100%; background: red; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="status">Audi & Dünya Yüklənir...</div>
        <div class="bar"><div id="prog"></div></div>
        <p style="font-size: 12px; color: gray;">Böyük fayllar yüklənərkən ekran 10-20 saniyə qara qala bilər.</p>
    </div>

    <div id="ui">
        <div id="speed">0</div>
        <div style="color:red">KM/H</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fflate/0.7.4/fflate.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 30000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // İşığı kəskin artırdıq ki, qaranlıq qalmasın
        scene.add(new THREE.AmbientLight(0xffffff, 2.0)); 
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(500, 1000, 500);
        scene.add(sun);

        const manager = new THREE.LoadingManager();
        manager.onProgress = (url, loaded, total) => {
            document.getElementById('prog').style.width = (loaded / total * 100) + '%';
        };
        manager.onLoad = () => {
            document.getElementById('loading').style.display = 'none';
            animate();
        };

        const gltfLoader = new THREE.GLTFLoader(manager);
        const fbxLoader = new THREE.FBXLoader(manager);
        let playerCar, world;

        // 1. DÜNYANI YÜKLƏ (FBX)
        fbxLoader.load('Street environment_V01.FBX', function (object) {
            world = object;
            // Dünyanı çox kiçildirik ki, kameranın içində itməyək
            world.scale.set(0.005, 0.005, 0.005); 
            world.position.set(0, 0, 0);

            world.traverse(function (child) {
                if (child.isMesh) {
                    // Tekstura xətası olsa belə binalar boz görünsün (qara qalmasın)
                    if (!child.material.map) {
                        child.material = new THREE.MeshStandardMaterial({color: 0x888888});
                    }
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(world);
        }, undefined, (err) => {
            console.error("FBX Yüklənmədi, binalar yaradılır...");
            createFallbackWorld(); // Əgər fayl tapılmasa, köhnə binaları yarat
        });

        // 2. AUDI YÜKLƏ (GLB)
        gltfLoader.load('audi.glb', function(gltf) {
            playerCar = gltf.scene;
            playerCar.scale.set(1.5, 1.5, 1.5);
            playerCar.rotation.y = Math.PI; 
            scene.add(playerCar);
        });

        // Ehtiyat dünya (əgər FBX yüklənməsə oyun tam qaranlıq qalmasın)
        function createFallbackWorld() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x333333}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
        }

        let speed = 0, angle = 0, targetAngle = 0;
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (!playerCar) return;

            // Sürət idarəsi
            if (keys['KeyW']) speed = Math.min(speed + 0.02, (keys['ShiftLeft'] ? 3.5 : 1.8));
            else if (keys['KeyS']) speed = Math.max(speed - 0.04, -1);
            else speed *= 0.98;

            if (Math.abs(speed) > 0.1) {
                if (keys['KeyA']) targetAngle -= 0.04;
                if (keys['KeyD']) targetAngle += 0.04;
            }
            angle += (targetAngle - angle) * 0.1;

            playerCar.position.x += Math.sin(angle) * speed;
            playerCar.position.z += Math.cos(angle) * speed;
            playerCar.rotation.y = angle + Math.PI;

            // Kamera takibi
            const camOffset = new THREE.Vector3(0, 5, 15).applyQuaternion(playerCar.quaternion);
            camera.position.lerp(playerCar.position.clone().add(camOffset), 0.1);
            camera.lookAt(playerCar.position);

            document.getElementById('speed').innerText = Math.floor(Math.abs(speed) * 100);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Məcburi başlatma (15 saniyə sonra)
        setTimeout(() => {
            if(document.getElementById('loading').style.display !== 'none') {
                document.getElementById('loading').style.display = 'none';
                if(!world) createFallbackWorld();
                animate();
            }
        }, 15000);
    </script>
</body>
</html>
